<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>See What's in UP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .pill {
            -webkit-appearance: none;
            appearance: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(0,0,0,0.15);
            background: rgba(0,0,0,0.06);
            color: rgba(0,0,0,0.35);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            user-select: none;
        }
        .pill.active {
            background: #121212;
            border-color: #121212;
            color: #ffffff;
        }
        .pill:hover:not(.active) {
            background: rgba(0,0,0,0.12);
            border-color: rgba(0,0,0,0.3);
            color: rgba(0,0,0,0.6);
        }
        .pill:active { transform: scale(0.95); }

        /* CAROUSEL */
        #bldg-img-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid #bfbfbf;
            background: #ddd;
        }
        #carousel-track {
            display: flex;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #carousel-track img {
            min-width: 100%;
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }
        #carousel-prev, #carousel-next {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.45);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
        }
        #carousel-prev { left: 8px; }
        #carousel-next { right: 8px; }
        #carousel-prev:hover, #carousel-next:hover { background: rgba(0,0,0,0.7); }
        #carousel-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .carousel-dot.active {
            background: #ffffff;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Loading map...</p>
    </div>

    <header id="app-header">     
        <div class="header-main" id="menu-toggle">
            <img src="dge-logo.png" alt="DGE Logo" id="header-logo">
            <h1>See What's in UP <span class="arrow">▼</span></h1>
        </div>
        
        <div id="filter-menu">
            <button class="pill" id="check-ikot" data-layer="ikot">🚙 Ikot</button>
            <button class="pill active" id="check-food" data-layer="food">🍴 Food</button>
            <button class="pill active" id="check-water" data-layer="water">💧 Water</button>
            <button class="pill active" id="check-library" data-layer="library">📚 Library</button>
        </div>
    </header>

    <div id="map"></div>

    <div id="info-panel">
        <button id="close-btn">→</button>

        <div id="bldg-img-container" style="display: none;">
            <div id="carousel-track"></div>
            <button id="carousel-prev" style="display:none;">‹</button>
            <button id="carousel-next" style="display:none;">›</button>
            <div id="carousel-dots"></div>
        </div>

        <h2 id="bldg-name">Location Name</h2>
        <div id="bldg-tags"></div>

        <div id="food-section" class="amenity-detail" style="display: none;">
            <h3>🍴 Food Area</h3>
            <p id="food-info"></p>
            <div class="amenity-img-box"><img id="food-img" src=""></div>
        </div>
        <div id="lib-section" class="amenity-detail" style="display: none;">
            <h3>📚 Library</h3>
            <p id="lib-info"></p>
            <div class="amenity-img-box"><img id="lib-img" src=""></div>
        </div>
        <p id="bldg-desc"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
