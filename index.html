<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>See What's in UP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .pill {
            -webkit-appearance: none;
            appearance: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(0,0,0,0.15);
            background: rgba(0,0,0,0.06);
            color: rgba(0,0,0,0.35);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            user-select: none;
        }
        .pill.active {
            background: #121212;
            border-color: #121212;
            color: #ffffff;
        }
        .pill:hover:not(.active) {
            background: rgba(0,0,0,0.12);
            border-color: rgba(0,0,0,0.3);
            color: rgba(0,0,0,0.6);
        }
        .pill:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <header id="app-header">     
        <div class="header-main" id="menu-toggle">
            <img src="dge-logo.png" alt="DGE Logo" id="header-logo">
            <h1>See What's in UP <span class="arrow">▼</span></h1>
        </div>
        
        <div id="filter-menu">
            <button class="pill" id="check-ikot" data-layer="ikot">🚙 Ikot</button>
            <button class="pill active" id="check-food" data-layer="food">🍴 Food</button>
            <button class="pill active" id="check-water" data-layer="water">💧 Water</button>
            <button class="pill active" id="check-library" data-layer="library">📚 Library</button>
        </div>
    </header>

    <div id="map"></div>

    <div id="info-panel">
        <button id="close-btn">×</button>
        <div id="bldg-img-container" style="display: none;"><img id="bldg-img" src=""></div>
        <h2 id="bldg-name">Location Name</h2>
        <div id="bldg-tags"></div>
        <div id="food-section" class="amenity-detail" style="display: none;">
            <h3>🍴 Food Area</h3>
            <p id="food-info"></p>
            <div class="amenity-img-box"><img id="food-img" src=""></div>
        </div>
        <div id="lib-section" class="amenity-detail" style="display: none;">
            <h3>📚 Library</h3>
            <p id="lib-info"></p>
            <div class="amenity-img-box"><img id="lib-img" src=""></div>
        </div>
        <p id="bldg-desc"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
