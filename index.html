<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>See What's in UP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header id="app-header">     
        <div class="header-main" id="menu-toggle">
            <img src="dge-logo.png" alt="DGE Logo" id="header-logo">
            <h1>See What's in UP <span class="arrow">▼</span></h1>
        </div>
        
        <div id="filter-menu">
            <button class="pill" id="check-ikot" data-layer="ikot">🚙 Ikot</button>
            <button class="pill active" id="check-food" data-layer="food">🍴 Food</button>
            <button class="pill active" id="check-water" data-layer="water">💧 Water</button>
            <button class="pill active" id="check-library" data-layer="library">📚 Library</button>
        </div>
    </header>

    <div id="map"></div>

    <div id="info-panel">
        <button id="close-btn">×</button>
        <div id="bldg-img-container" style="display: none;"><img id="bldg-img" src=""></div>
        <h2 id="bldg-name">Location Name</h2>
        <div id="bldg-tags"></div>
        <div id="food-section" class="amenity-detail" style="display: none;">
            <h3>🍴 Food Area</h3>
            <p id="food-info"></p>
            <div class="amenity-img-box"><img id="food-img" src=""></div>
        </div>
        <div id="lib-section" class="amenity-detail" style="display: none;">
            <h3>📚 Library</h3>
            <p id="lib-info"></p>
            <div class="amenity-img-box"><img id="lib-img" src=""></div>
        </div>
        <p id="bldg-desc"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
