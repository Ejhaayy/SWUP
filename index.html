<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>See What's in UP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header id="app-header">     
        <img src="dge-logo.png" alt="DGE Logo" id="header-logo">
        <h1>See What's in UP</h1>
    </header>

    <div id="map"></div>

    <div id="info-panel">
        <button id="close-btn">&times;</button>
        
        <div id="bldg-img-container" style="display: none;">
            <img id="bldg-img" src="" alt="Location Image">
        </div>

        <h2 id="bldg-name">Location Name</h2>
        <p id="bldg-desc">Description will appear here.</p>
        <div id="bldg-tags"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
